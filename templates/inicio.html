<!DOCTYPE html>
<html>
<head>
    <title>Inventario</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#00d4ff">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="center-page">
    <div class="logo" style="margin-bottom:30px;">
        <img src="/static/icon.svg">
        <div class="logo-text">Stock<span>Pro</span></div>
    </div>

    <div style="width:100%; max-width:380px;">
        <p style="text-align:center; color:#aaa; font-size:14px; margin-bottom:25px;">
            Hola, <strong>{{ session['usuario'] }}</strong> — {{ rol }}
        </p>

        <a href="/" class="btn btn-cyan">🔍 Buscar producto</a>
        <a href="/ventas" class="btn btn-red">💰 Registrar venta</a>
        {% if rol == "admin" %}
        <a href="/admin" class="btn btn-orange">🛒 Agregar producto</a>
        <a href="/reportes" class="btn btn-purple">📊 Reportes</a>
        {% endif %}
        <a href="/logout" class="btn btn-outline" style="margin-top:10px;">Cerrar sesión</a>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/sw.js');
        }
    </script>
</body>
</html>
