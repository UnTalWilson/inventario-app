<!DOCTYPE html>
<html>
<head>
    <title>Login Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#222222">
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
</script>
    <style>
        body { font-family: Arial; text-align: center; padding: 30px; background: #f5f5f5; }
        form { background: white; padding: 30px; border-radius: 10px; max-width: 300px; margin: auto; }
        input { padding: 12px; width: 90%; font-size: 16px; margin-bottom: 10px; }
        button { padding: 12px; width: 95%; font-size: 16px; background: #333; color: white; border: none; border-radius: 5px; }
        .error { color: red; }
    </style>
</head>
<body>
    <h2>Panel Admin</h2>
    <form method="POST">
        <input type="text" name="usuario" placeholder="Usuario"><br>
        <input type="password" name="password" placeholder="Contraseña"><br>
        <button type="submit">Entrar</button>
    </form>
    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}
</body>
</html>
