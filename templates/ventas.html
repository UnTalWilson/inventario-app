<!DOCTYPE html>
<html>
<head>
    <title>Registrar Venta</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#00d4ff">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="header">
        <a href="/inicio" class="logo">
            <img src="/static/icon.svg">
            <div class="logo-text">Stock<span>Pro</span></div>
        </a>
        <a href="/inicio" style="color:#aaa; font-size:14px; text-decoration:none;">← Inicio</a>
    </div>

    {% if mensaje %}
    <div class="{% if '✅' in mensaje %}msg-ok{% else %}msg-error{% endif %}" style="max-width:500px; margin:0 auto 15px;">
        {{ mensaje }}
    </div>
    {% endif %}

    <div class="card card-red">
        <h3>💰 Registrar venta</h3>
        <form method="POST">
            <input type="text" name="codigo" placeholder="Código del producto" value="{{ request.form.get('codigo', '') }}">
            <button type="submit" name="accion" value="buscar" class="btn btn-cyan">🔍 Buscar</button>
        </form>
    </div>

    {% if producto %}
    <div class="card card-red">
        <div class="fila"><span class="label">Producto</span><span class="valor">{{ producto[0] }}</span></div>
        <div class="fila"><span class="label">Stock disponible</span><span class="valor">{{ producto[1] }}</span></div>
        <div class="fila"><span class="label">Precio</span><span class="valor">Bs {{ producto[2] }}</span></div>
        <form method="POST" style="margin-top:15px;">
            <input type="hidden" name="codigo" value="{{ request.form.get('codigo') }}">
            <input type="number" name="cantidad" placeholder="Cantidad a vender" min="1" max="{{ producto[1] }}" required>
            <button type="submit" name="accion" value="vender" class="btn btn-red">✅ Confirmar venta</button>
        </form>
    </div>
    {% endif %}

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/sw.js');
        }
    </script>
</body>
</html>
